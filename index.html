<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maps UI Preview</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="map">

  <!-- SIDEBAR -->
  <div class="sidebar">
  
    <div>📌<br>Saved</div>
    <div>🕘<br>Recents</div>
    <div>🗺️<br>Maps</div>
    <div>R<br>Rute</div>
  </div>

  <!-- SEARCH -->
  <div class="search-bar">
    🔍 cari lokasi
  </div>

  <!-- PANEL FITUR -->
  <div class="panel">
    <div class="btn">🎲 Acak Posisi</div>
    <div class="btn">⏯ Start / Pause</div>
    <div class="btn">🗺️ 2D / 3D</div>
    <div class="btn">🌍 Acak Map</div>
    <div class="btn">🚗 Kendaraan</div>
  </div>

  <!-- ZOOM -->
  <div class="zoom">
    <div>+</div>
    <div>−</div>
  </div>

  <!-- MARKER -->
  <div class="marker">📍</div>

  <!-- MARKER -->
  <div class="marker"></div>

  <!-- VEHICLE -->
  <div class="vehicle">🚗</div>

</div>

</body>
</html>
